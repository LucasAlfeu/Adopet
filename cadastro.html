<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Adopet</title>

    <link rel="stylesheet" href="./asstes/css/style.css">
    <link rel="stylesheet" href="./asstes/css/cabecalho.css">
    <link rel="stylesheet" href="./asstes/css/imagens-fundo.css">
    <link rel="stylesheet" href="./asstes/css/titulo-texto.css">
    <link rel="stylesheet" href="./asstes/css/formulario.css">
    <link rel="stylesheet" href="./asstes/css/rodape.css">
</head>
<body>
    <body>
        <div class="imagem-1"></div>
        <div class="imagem-2"></div>
        <div class="imagem-3"></div>
        <div class="imagem-cadastro-login"></div>
        <div class="imagem-patas"></div>

        <header class="cabecalho">
            <div class="cabecalho__container">
                <div class="logo__cabecalho"></div>
                <a href="./home.html" class="home__cabecalho"><img src="./asstes/image/Mobile/Header/Casa.svg" alt="Inicio"></a>
                <a href="./mensagem.html" class="mensagem__cabecalho"><img src="./asstes/image/Mobile/Header/Mensagens.svg" alt="Mensagens"></a>
            </div>
        </header>
        <main class="principal">
            <h1><div class="logo__principal"></div></h1>

            <section class="texto">
                <p class="primeiro__texto">Ainda não tem cadastro?</p>
                <p class="segundo__texto">Então, antes de buscar seu melhor amigo, precisamos de alguns dados:</p>
            </section>
            <form class="formulario" id="form">

                <label for="email" class="nome__formulario">Email</label>
                <input type="email" name="email" id="email" class="input__formulario" placeholder="Escolha seu melhor email" >
                <span id="erro-email"></span>

                <label for="nome" class="nome__formulario">Nome</label>
                <input type="text" name="nome" id="nome" class="input__formulario" placeholder="Digite seu nome completo" >
                <span id="erro-nome"></span>

                <label for="senha" class="nome__formulario">Senha</label>      
                <input type="password" name="senha" id="senha" class="input__formulario" placeholder="Crie uma senha" minlength="8">                    
                <div class="esconde__formulario"></div>
                <span id="erro-senha"></span>

                <label for="senha_confirma" class="nome__formulario">Confirme sua senha</label>                
                <div class="esconde__formulario2"></div>
                <input type="password" name="senha_confirma" id="senha_confirma" class="input__formulario" placeholder="Repita a senha criada acima" >
                <span id="erro-senhaConfirma"></span>
                    
                <input type="button" value="Cadastrar" class="botao__formulario">
            </form>
        </main> 
        <footer class="rodape">
            <p class="texto__rodape">2022 - Desenvolvido por Alura.</p>
        </footer> 

        <script src="./asstes/js/validaCadastro.js"></script>
</body>
</html>
